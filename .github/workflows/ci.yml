name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # EchoDraft.xcodeproj is committed (regenerate with: xcodegen generate from project.yml).
      - name: Build EchoDraft (Xcode Release + Debug compile check)
        env:
          ECHODRAFT_USE_STUB_ML: "1"
        run: |
          set -euo pipefail
          xcodebuild -project EchoDraft.xcodeproj -scheme EchoDraft \
            -destination 'platform=macOS,arch=arm64' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
