name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # EchoDraft.xcodeproj is gitignored (generate with: xcodegen generate from project.yml).
      # CI builds via SwiftPM so the same sources compile on every push without committing the .xcodeproj.
      - name: Build EchoDraft (SwiftPM)
        env:
          ECHODRAFT_USE_STUB_ML: "1"
        run: swift build --configuration debug
